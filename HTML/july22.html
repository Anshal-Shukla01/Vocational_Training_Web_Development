<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .div1{
        width: 100px; height: 100px; background-color: red !important;
        background-image: linear-gradient(to bottom,yellow,powderblue);
        }
        /* .container{
            background-color: aqua;
        } */
        .div2{
        width: 100px; height: 100px; background-color: red !important;
        background-image: linear-gradient(to top,yellow,powderblue);
        }
        .div3{
        width: 100px; height: 100px; background-color: red !important;
        background-image: linear-gradient(to right,yellow,powderblue);
        }
        .div4{
        width: 100px; height: 100px; background-color: red !important;
        background-image: linear-gradient(to left,yellow,powderblue);
        }
        .div5{
        width: 100px; height: 100px; background-color: red !important;
        background-image: linear-gradient(to bottom right,yellow,powderblue);
        }
        .div6{
        width: 100px; height: 100px; background-color: red !important;
        background-image: linear-gradient(45deg,yellow,powderblue);
        }
        .div7{
        width: 100px; height: 100px; background-color: red !important;
        background-image: linear-gradient(to bottom right,yellow,powderblue,brown);
        }
        .div8{
        width: 100px; height: 100px; background-color: red !important;
        color:azure;
        background-image: linear-gradient(to right,violet,indigo,blue,green,yellow,orange,red);
        }
        .div9{
        width: 100px; height: 100px; background-color: red !important;
        background-image: repeating-linear-gradient(pink,violet 10%, indigo 20%);
        }
        .div10{
        width: 100px; height: 100px; background-color: red !important;
        color:azure;
        background-image: radial-gradient(pink,violet , indigo );
        }
        .div11{
        width: 100px; height: 100px; background-color: red !important;
        color:azure;
        background-image: repeating-radial-gradient(pink,violet 10%, indigo 20%);
        }
        .div12{
        width: 100px; height: 100px; background-color: red !important;
        color:azure;
        background-image: conic-gradient(pink,violet , indigo );
        }
        .div13{
        width: 100px; height: 100px; background-color: red !important;
        color:azure;
        background-image: conic-gradient(from 90deg,pink,violet , indigo );
        }
        .div14{
        width: 100px; height: 100px; background-color: red !important;
        background-image: conic-gradient(red 45deg,yellow 90deg,aqua );
        }
        .div15{
        width: 100px; height: 100px; background-color: red !important;
        color:azure;
        background-image: conic-gradient(red 0deg,red 90deg,yellow 90deg, yellow 180deg,green 
        180deg, green 270deg, blue 270deg );
        }
    </style>
</head>
<body>

  <div class="div1" >To Bottom</div>  
  <br/><br/>
  <div class="div2" >To Top</div>  
  <br/><br/>
  <div class="div3" >To Right</div>  
  <br/><br/>
  <div class="div4" >To Left</div>  
  <br/><br/>
  <div class="div5" >To Bottom Right</div>  
  <br/><br/>
  <div class="div6" >45 Deg</div>  
  <br/><br/>
  <div class="div7" >3 Color To bottom right</div>  
  <br/><br/>
  <div class="div8" >Rainbow</div>  
  <br/><br/>
  <div class="div9" >Repeating Linear Gradient</div>  
  <br/><br/>
  <div class="div10" >Radial Gradient</div>  
  <br/><br/>
  <div class="div11" >Repeating Linear Gradient</div>  
  <br/><br/>
  <div class="div12" >Conic Gradient</div>  
  <br/><br/>
  <div class="div13" >Conic Gradient from 90deg</div>  
  <br/><br/>
  <div class="div14" >3 Colors in different degree</div>  
  <br/><br/>
  <div class="div15" >4 Colors in different degree</div>  
  <br/><br/>

</body>
</html>
