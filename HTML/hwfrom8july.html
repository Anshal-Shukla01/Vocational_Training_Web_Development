<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <img src="Images\bitheading.png" alt="BIT Heading">
    <h3>Admission Form For Session 2026-27</h3><hr>
</head>
<body>
    <form>
        <label>Student Name :</label>
        <input type="text" placeholder="Enter Name" name="Name" /><br/>
        <br/>
        <label>Father Name :</label>
        <input type="text" placeholder="Enter Father Name" /><br/>
        <br/>
        <label>Mother Name :</label>
        <input type="text" placeholder="Enter Mother Name" /><br/>
        <br/>
        <label>Gender :</label>
        <input type="radio" id="male" name="gender" />Male      
        <input type="radio" id="female" name="gender" />Female
        <br/>
        <br/>
        <label>Date of Birth :</label>
        <input type="date" /><br/>
        <br/>
        <label>Mobile Number :</label>
        <input type="number" placeholder="Enter Mobile Number" /><br/>
        <br/>
        <label>Alternate Mobile Number :</label>
        <input type="number" placeholder="Enter Alternate Mobile No." /><br/>
        <br/>
        <label>Email :</label>
        <input type="email" placeholder="Enter Email" /><br/>
        <br/>
        <label>Residential Address :</label>
        <textarea type="text" placeholder="Enter Full Residential Address Including City,State,Pin Code" rows="1" cols="60" ></textarea><br/>
        <br/>
        <label>Permanent Address :</label>
        <textarea type="text" placeholder="Enter Full Permanent Address Including City,State,Pin Code" rows="1" cols="60"></textarea><br/>
        <br/>
        <label>Higher Qualification :</label>
        <select>
            <option>Select</option>
            <option>12th</option>
            <option>Diploma</option>
            <option>Graduate</option>
        </select><br/>   
        <br/>
        <label>Higher Qualification Percentage :</label>
        <input type="number" placeholder="Enter %" min="0" max="100" /><br/>
        <br/>
        <label>Course :</label>
        <select>
            <option>Select</option>
            <option>B.Tech</option>
            <option>M.Tech</option>
        </select><br/>
        <br/>
        <label>Branch :</label>
        <select>
            <option>Select</option>
            <option>Computer Science</option>
            <option>Electronics</option>
            <option>Mechanical</option>
            <option>Civil</option>
            <option>Electrical</option>
            <option>Information Technology</option>
            <option>Biotechnology</option>
            <option>Chemical</option>
            <option>Metallurgical</option>
        </select><br/>  
        <br/>
        <label>Mode of Admission :</label>
        <select>
            <option>Select</option>
            <option>Merit</option>
            <option>Management</option>
        </select><br/>
        <br/>
        <label>Upload Photo :</label>
        <input type="file" /><br/>
        <br/>
        <label>Upload Signature :</label>
        <input type="file" /><br/>
        <br/>
        <label>Upload Marksheet :</label>
        <input type="file" /><br/>
        <br/><hr>
        <input type="checkbox" />I hereby declare that the information provided above is true and correct to the best of my knowledge.<br/>
        <br/>
        <button type="submit">Submit</button><br/>
        <br/>
        <button type="reset">Reset</button><br/>
        <br/>   
        
    

    </form>
    
</body>
</html>
